name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            이 저장소의 PR #${{ github.event.pull_request.number }} 를 한국어로 코드 리뷰하라.
            저장소 루트의 CLAUDE.md, REVIEW.md 규칙을 우선 따른다.

            점검 항목:
            1. 로직 버그 / 엣지 케이스 / null·미초기화
            2. 보안 취약점 (injection, eval, 인증·인가, 하드코딩된 시크릿)
            3. 성능 및 명백한 코드 품질 문제

            발견한 각 이슈는 반드시 mcp__github_inline_comment__create_inline_comment
            도구로 해당 파일·라인에 인라인 코멘트를 남겨라.
            - 심각도: 🔴(버그/보안) 또는 🟡(스타일/사소)
            - 가능하면 수정 코드 제안(suggestion)을 포함
            최대 20개까지 작성하고, 마지막에 한 줄 요약 코멘트를 남겨라.
            지적할 이슈가 없으면 "LGTM" 요약만 남겨라.
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,Read,Grep,Glob,Bash(gh:*),Bash(git:*)" --max-turns 25'
